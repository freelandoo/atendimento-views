<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - PJ Codeworks</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard/css/dashboard.css" />
  <link rel="stylesheet" href="dashboard/css/site-shell.css" />
</head>
<body>
  <main class="dash-login-shell">
    <form class="card dash-login-card" id="dashboard-login-form">
      <div class="logo"><img src="dashboard/assets/pj-codeworks-logo.png" alt="PJ Codeworks" /><span>Dashboard</span></div>
      <h1>Acesso interno</h1>
      <label for="dashboard-login-email">E-mail</label>
      <input type="email" id="dashboard-login-email" autocomplete="username" required />
      <label for="dashboard-login-password">Senha</label>
      <input type="password" id="dashboard-login-password" autocomplete="current-password" required />
      <button type="submit" class="btn-reproc">Entrar</button>
      <p class="painel-nota-agente" id="dashboard-login-status" aria-live="polite"></p>
    </form>
  </main>
  <footer class="site-footer site-footer--login" role="contentinfo">
    <span>© PJ Codeworks</span>
    <span>
      <a href="https://www.pjcodeworks.com.br" target="_blank" rel="noopener noreferrer">Site institucional</a>
    </span>
  </footer>
  <script src="dashboard/js/core.js"></script>
</body>
</html>
